server {
    listen 80;

    # ── Security headers ──────────────────────────────────────────────────────
    # Strict-Transport-Security is intentionally omitted here — it must only be
    # sent over HTTPS. It is included in the TLS server block below.
    add_header X-Frame-Options            "DENY"                            always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header X-XSS-Protection           "0"                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                     always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=(), usb=(), display-capture=()" always;
    # img-src/media-src/frame-src include https:/http: to allow images, videos and embeds in RSS article content
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; media-src 'self' https: http:; frame-src https:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml font/woff2;
    gzip_min_length 1024;
    gzip_vary on;

    # Long-lived cache for hashed Vite bundles.
    # Security headers are repeated here because nginx's add_header in a nested
    # location block does not inherit parent-level headers.
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control              "public, immutable"               always;
        add_header X-Frame-Options            "DENY"                            always;
        add_header X-Content-Type-Options     "nosniff"                         always;
        add_header X-XSS-Protection           "0"                               always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin"                     always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=(), usb=(), display-capture=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; media-src 'self' https: http:; frame-src https:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
    }

    # Moderate cache for images and icons.
    # Security headers repeated for the same reason as above.
    location ~* \.(svg|ico|png|jpg|jpeg|gif)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control              "public"                          always;
        add_header X-Frame-Options            "DENY"                            always;
        add_header X-Content-Type-Options     "nosniff"                         always;
        add_header X-XSS-Protection           "0"                               always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin"                     always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=(), usb=(), display-capture=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; media-src 'self' https: http:; frame-src https:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
    }

    # Serve React SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy gRPC-web (connect-web) to .NET API
    # Trailing slash strips the /grpc prefix before forwarding
    location /grpc/ {
        proxy_pass         http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy favicon requests to API (avoids CORB/CORP browser restrictions)
    location /proxy/ {
        proxy_pass         http://api:8080/proxy/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy REST meta endpoint and sitemap to API
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /sitemap.xml {
        proxy_pass         http://api:8080/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /robots.txt {
        proxy_pass         http://api:8080/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

