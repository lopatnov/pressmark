server {
    listen 80;

    # ── Security headers ──────────────────────────────────────────────────────
    # Strict-Transport-Security is intentionally omitted here — it must only be
    # sent over HTTPS. It is included in the TLS server block below.
    add_header X-Frame-Options            "DENY"                            always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header X-XSS-Protection           "0"                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                     always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=(), usb=(), display-capture=()" always;
    # img-src/media-src include http: and https: to allow images and videos embedded in RSS article content
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; media-src 'self' https: http:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    # Serve React SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy gRPC-web (connect-web) to .NET API
    # Trailing slash strips the /grpc prefix before forwarding
    location /grpc/ {
        proxy_pass         http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Production: HTTP → HTTPS redirect ────────────────────────────────────────
# To enable TLS:
#   1. Uncomment this block and the HTTPS server block below.
#   2. Comment out (or remove) the HTTP server block above.
#   3. Fill in your domain name and certificate paths in the HTTPS block.
#   4. Mount certificates — add to the "web" service in docker-compose.yml:
#        volumes:
#          - /etc/letsencrypt/live/your-domain.com:/etc/nginx/certs:ro
#   5. Expose port 443 in docker-compose.yml (see the commented port there).
#
# server {
#     listen 80;
#     return 301 https://$host$request_uri;
# }

