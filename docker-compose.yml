services:
  # Bundled MSSQL instance for convenience.
  # To use an external database instead (Azure SQL, a managed server, a local instance, etc.):
  #   1. Remove or comment out this entire "db" service.
  #   2. Remove the "depends_on: db" condition from the "api" service below.
  #   3. Set ConnectionStrings__Default in the "api" environment (or in your .env file)
  #      to point at your external server — see the connection string format in the comment
  #      on ConnectionStrings__Default below.
  #   4. Remove the "mssql_data" volume at the bottom of this file if it is no longer needed.
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1434:1433"   # host:container — local SQL Server stays on 1433
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Pressmark.Api/Dockerfile
    environment:
      # Connection string format:
      #   Server=<host>,<port>;Database=<db>;User Id=<user>;Password=<pass>;TrustServerCertificate=True
      # For an external server replace the value here or override it via the .env file.
      ConnectionStrings__Default: "Server=db,1433;Database=pressmark;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__ExpiryMinutes: "15"
      Jwt__RefreshExpiryDays: "7"
      Jwt__RefreshCookieName: "refresh_token"
      Cors__AllowedOrigins: "${CORS_ALLOWED_ORIGINS}"
      RssFetcher__IntervalMinutes: "15"
      RssFetcher__MaxItemsPerFeed: "50"
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/pressmark-web/Dockerfile
    ports:
      - "80:80"     # HTTP — change to "443:443" when enabling TLS in nginx/nginx.conf
      # - "443:443" # Uncomment when the HTTPS server block in nginx/nginx.conf is enabled
    depends_on:
      api:
        condition: service_healthy

volumes:
  mssql_data:
