syntax = "proto3";

option csharp_namespace = "Pressmark.Api.Protos";

package pressmark.admin;

import "google/protobuf/empty.proto";

service AdminService {
  rpc GetSiteSettings          (google.protobuf.Empty)          returns (SiteSettings);
  rpc UpdateSiteSettings       (UpdateSiteSettingsRequest)       returns (google.protobuf.Empty);
  rpc HideFeedItem             (HideFeedItemRequest)             returns (google.protobuf.Empty);
  rpc BanSubscription          (BanSubscriptionRequest)          returns (google.protobuf.Empty);
  rpc ListUsers                (ListUsersRequest)                returns (UserList);
  rpc GenerateInvite           (GenerateInviteRequest)           returns (InviteToken);
  rpc DeleteInvite             (DeleteInviteRequest)             returns (google.protobuf.Empty);
  rpc ListInvites              (ListInvitesRequest)              returns (InviteList);
  rpc ListBannedSubscriptions  (ListBannedSubscriptionsRequest)  returns (BannedSubscriptionList);
  rpc RemoveComment            (RemoveCommentRequest)            returns (google.protobuf.Empty);
  rpc BanUserFromCommenting    (BanUserFromCommentingRequest)    returns (google.protobuf.Empty);
  rpc GetPendingReportCount    (google.protobuf.Empty)           returns (PendingReportCount);
  rpc ListReports              (ListReportsRequest)              returns (ReportList);
  rpc ResolveReport            (ResolveReportRequest)            returns (google.protobuf.Empty);
  rpc ListHiddenFeedItems      (ListHiddenFeedItemsRequest)      returns (HiddenFeedItemList);
  rpc SitebanUser              (SitebanUserRequest)              returns (google.protobuf.Empty);
  rpc DeleteUser               (DeleteUserRequest)               returns (google.protobuf.Empty);
  rpc ChangeUserRole           (ChangeUserRoleRequest)           returns (google.protobuf.Empty);
  rpc GetUserDetails           (GetUserDetailsRequest)           returns (UserDetails);
}

message SiteSettings {
  string site_name              = 1;
  int32  community_window_days  = 2;
  string registration_mode      = 3; // "open" | "invite_only"
  string smtp_host              = 4;
  int32  smtp_port              = 5;
  string smtp_user              = 6;
  string smtp_password          = 7; // write-only: always returned as "" by GetSiteSettings
  bool   smtp_use_tls           = 8;
  string smtp_from_address      = 9;
  bool   comments_enabled       = 10; // default true
  int32  feed_retention_days    = 11; // days to keep items without bookmarks; default 90
}

message UpdateSiteSettingsRequest {
  SiteSettings settings = 1;
}

message HideFeedItemRequest {
  string feed_item_id = 1;
  bool   hidden       = 2;
}

message BanSubscriptionRequest {
  string subscription_id = 1;
  bool   banned          = 2;
}

message ListUsersRequest {
  int32 page_size = 1; // default 20
  int32 page      = 2; // 0-based
}

message UserList {
  repeated UserInfo users      = 1;
  int32             total_count = 2;
}

message UserInfo {
  string id                   = 1;
  string email                = 2;
  string role                 = 3;
  string created_at           = 4;
  bool   is_commenting_banned = 5;
  bool   is_site_banned       = 6;
}

message GenerateInviteRequest {
  string note         = 1;
  int32  expires_days = 2;  // 0 = no expiry; default 7 days recommended by frontend
  string notify_email = 3;  // if non-empty and SMTP configured, send the invite token to this address
}

message DeleteInviteRequest {
  string id = 1;
}

message InviteToken {
  string id         = 1;
  string token      = 2;  // full token shown only on creation; empty in ListInvites
  string note       = 3;
  string created_at = 4;
  bool   is_used    = 5;
  string used_at    = 6;
  string expires_at = 7;  // empty = no expiry
}

message ListInvitesRequest {
  int32 page_size = 1; // default 20
  int32 page      = 2; // 0-based
}

message InviteList {
  repeated InviteToken items       = 1;
  int32                total_count = 2;
}

message ListBannedSubscriptionsRequest {
  int32 page_size = 1; // default 20
  int32 page      = 2; // 0-based
}

message BannedSubscription {
  string id      = 1;
  string rss_url = 2;
  string title   = 3;
}

message BannedSubscriptionList {
  repeated BannedSubscription items       = 1;
  int32                       total_count = 2;
}

message RemoveCommentRequest {
  string comment_id = 1;
}

message BanUserFromCommentingRequest {
  string user_id = 1;
  bool   banned  = 2;
}

message PendingReportCount {
  int32 count = 1;
}

message ListReportsRequest {
  int32 page_size = 1; // default 20
  int32 page      = 2; // 0-based
}

message Report {
  string id               = 1;
  string type             = 2;  // "comment" | "subscription"
  string target_id        = 3;
  string reason           = 4;
  string created_at       = 5;
  bool   is_resolved      = 6;
  string reporter_email   = 7;
  string reporter_joined  = 8;  // reporter's account created_at
  string content          = 9;  // comment body or subscription title
  string content_url      = 10; // rss_url for subscription reports; empty for comment reports
  string article_id       = 11; // feed_item_id for comment reports; empty for subscription reports
  string target_user_email = 12; // comment author email for comment reports; empty for subscription reports
}

message ReportList {
  repeated Report items       = 1;
  int32           total_count = 2;
}

message ResolveReportRequest {
  string id = 1;
}

message ListHiddenFeedItemsRequest {
  int32 page_size = 1; // default 20
  int32 page      = 2; // 0-based
}

message HiddenFeedItem {
  string id           = 1;
  string title        = 2;
  string url          = 3;
  string source_title = 4;
}

message HiddenFeedItemList {
  repeated HiddenFeedItem items       = 1;
  int32                   total_count = 2;
}

message SitebanUserRequest {
  string user_id = 1;
  bool   banned  = 2;
}

message DeleteUserRequest {
  string user_id = 1;
}

message ChangeUserRoleRequest {
  string user_id = 1;
  string role    = 2; // "User" | "Admin"
}

message GetUserDetailsRequest {
  string user_id = 1;
}

message UserSubscriptionInfo {
  string id                  = 1;
  string rss_url             = 2;
  string title               = 3;
  bool   is_community_banned = 4;
}

message UserCommentInfo {
  string id               = 1;
  string body             = 2;
  string created_at       = 3;
  string feed_item_id     = 4;
  string feed_item_title  = 5;
  bool   removed_by_admin = 6;
}

message UserDetails {
  UserInfo                      user          = 1;
  repeated UserSubscriptionInfo subscriptions = 2;
  repeated UserCommentInfo      comments      = 3;
}
