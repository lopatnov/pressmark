syntax = "proto3";

option csharp_namespace = "Pressmark.Api.Protos";

package pressmark.subscription;

import "google/protobuf/empty.proto";

service SubscriptionService {
  rpc AddSubscription    (AddSubscriptionRequest)    returns (Subscription);
  rpc RemoveSubscription (RemoveSubscriptionRequest) returns (google.protobuf.Empty);
  rpc ListSubscriptions  (google.protobuf.Empty)     returns (SubscriptionList);
  rpc UpdateSubscription (UpdateSubscriptionRequest) returns (Subscription);
  rpc ImportSubscriptions (ImportSubscriptionsRequest) returns (ImportSubscriptionsResponse);
  rpc ExportSubscriptions (google.protobuf.Empty)      returns (ExportSubscriptionsResponse);
  rpc TriggerFetch       (TriggerFetchRequest)       returns (TriggerFetchResponse);
}

message AddSubscriptionRequest {
  string rss_url = 1;
  string title   = 2;
}

message RemoveSubscriptionRequest {
  string subscription_id = 1;
}

message UpdateSubscriptionRequest {
  string subscription_id = 1;
  string display_name    = 2;
}

message Subscription {
  string id                  = 1;
  string user_id             = 2;
  string rss_url             = 3;
  string title               = 4;
  string last_fetched_at     = 5;
  string created_at          = 6;
  bool   is_community_banned = 7;
}

message SubscriptionList {
  repeated Subscription subscriptions = 1;
}

message ImportSubscriptionsRequest {
  string opml_content = 1;
}

message ImportSubscriptionsResponse {
  int32 imported = 1;
  int32 skipped  = 2;
}

message ExportSubscriptionsResponse {
  string opml_content = 1;
}

message TriggerFetchRequest {
  string subscription_id = 1;
}

message TriggerFetchResponse {
  int32 new_items = 1;
}
