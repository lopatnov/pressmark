syntax = "proto3";

option csharp_namespace = "Pressmark.Api.Protos";

package pressmark.feed;

import "google/protobuf/empty.proto";

service FeedService {
  // Personal feed (authenticated)
  rpc GetFeed       (GetFeedRequest)       returns (FeedPage);
  rpc MarkAsRead    (MarkAsReadRequest)    returns (google.protobuf.Empty);
  rpc MarkAllAsRead (MarkAllAsReadRequest) returns (google.protobuf.Empty);
  rpc GetUnreadCount(google.protobuf.Empty) returns (UnreadCount);

  // Likes (authenticated)
  rpc ToggleLike (ToggleLikeRequest) returns (ToggleLikeResponse);

  // Bookmarks (authenticated)
  rpc ToggleBookmark (ToggleBookmarkRequest)  returns (ToggleBookmarkResponse);
  rpc GetBookmarks   (GetBookmarksRequest)    returns (FeedPage);

  // Community feed (anonymous — no JWT required)
  rpc GetCommunityFeed (GetCommunityFeedRequest) returns (FeedPage);

  // Real-time streaming of new feed items (authenticated)
  rpc StreamFeedUpdates (StreamFeedRequest) returns (stream FeedItem);

  // Comments
  rpc AddComment                (AddCommentRequest)                returns (Comment);
  rpc ListComments              (ListCommentsRequest)              returns (CommentList); // AllowAnonymous
  rpc ToggleCommentSubscription (ToggleCommentSubscriptionRequest) returns (ToggleCommentSubscriptionResponse);

  // Article page (anonymous)
  rpc GetFeedItem (GetFeedItemRequest) returns (FeedItem); // AllowAnonymous

  // Reporting
  rpc ReportContent (ReportContentRequest) returns (google.protobuf.Empty); // Authenticated
}

message GetFeedRequest {
  int32  page_size       = 1; // default: 20, max: 100
  string cursor          = 2; // empty = first page
  bool   unread_only     = 3;
  string subscription_id = 4; // empty = all subscriptions
}

message GetCommunityFeedRequest {
  int32  page_size       = 1; // default: 20, max: 100
  string cursor          = 2; // empty = first page
  string source_rss_url  = 3; // empty = all sources
}

message GetBookmarksRequest {
  int32  page_size       = 1;
  string cursor          = 2;
  string subscription_id = 3; // empty = all bookmarks
}

message StreamFeedRequest {
  string since_timestamp = 1; // ISO 8601; empty = stream from connection time
}

message FeedPage {
  repeated FeedItem items        = 1;
  string            next_cursor  = 2; // empty = no more pages
  int32             total_unread = 3;
}

message FeedItem {
  string id              = 1;
  string subscription_id = 2;
  string title           = 3;
  string url             = 4;
  string summary         = 5;
  string published_at    = 6;
  bool   is_read         = 7;
  int32  like_count      = 8;
  bool   is_liked        = 9;
  bool   is_bookmarked   = 10;
  string source_title    = 11;
  string image_url       = 12; // empty if RSS has no image
  string source_rss_url  = 13; // RSS URL of the source subscription
  bool   is_hidden        = 14; // true if community-hidden (only set for Admin callers)
  bool   is_source_banned = 15; // true if this item's subscription is community-banned
}

message MarkAsReadRequest {
  string feed_item_id = 1;
}

message MarkAllAsReadRequest {
  string subscription_id = 1; // empty = all subscriptions
}

message UnreadCount {
  int32 count = 1;
}

message ToggleLikeRequest {
  string feed_item_id = 1;
}

message ToggleLikeResponse {
  bool  is_liked   = 1;
  int32 like_count = 2;
}

message ToggleBookmarkRequest {
  string feed_item_id = 1;
}

message ToggleBookmarkResponse {
  bool is_bookmarked = 1;
}

message AddCommentRequest {
  string feed_item_id = 1;
  string body         = 2;
}

message ListCommentsRequest {
  string feed_item_id = 1;
}

message Comment {
  string id                   = 1;
  string user_email           = 2;
  string body                 = 3;
  string created_at           = 4;
  bool   removed_by_admin     = 5;
  bool   is_commenting_banned = 6;
}

message CommentList {
  repeated Comment items  = 1;
  bool            is_subscribed = 2; // true if the authenticated user is subscribed to comment notifications for this item
}

message ToggleCommentSubscriptionRequest {
  string feed_item_id = 1;
}

message ToggleCommentSubscriptionResponse {
  bool subscribed = 1;
}

message GetFeedItemRequest {
  string feed_item_id = 1;
}

message ReportContentRequest {
  string type      = 1; // "comment" | "subscription"
  string target_id = 2;
  string reason    = 3; // optional
}
