syntax = "proto3";

option csharp_namespace = "Pressmark.Api.Protos";

package pressmark.auth;

import "google/protobuf/empty.proto";

service AuthService {
  rpc Register                (RegisterRequest)       returns (AuthResponse);
  rpc Login                   (LoginRequest)          returns (AuthResponse);
  rpc Refresh                 (RefreshRequest)        returns (AuthResponse);
  rpc Logout                  (google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc ForgotPassword          (ForgotPasswordRequest) returns (google.protobuf.Empty);
  rpc ResetPassword           (ResetPasswordRequest)  returns (google.protobuf.Empty);
  rpc GetRegistrationStatus   (google.protobuf.Empty) returns (RegistrationStatus);  // [AllowAnonymous]
}

message RegisterRequest {
  string email        = 1;
  string password     = 2;
  string invite_token = 3;  // required when registration_mode = invite_only
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message RefreshRequest {}

message AuthResponse {
  string access_token = 1;
  string email        = 2;
  string user_id      = 3;
  string role         = 4;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token        = 1;
  string new_password = 2;
}

message RegistrationStatus {
  bool   has_admin             = 1;  // false = first registered user becomes Admin
  string registration_mode     = 2;  // "open" | "invite_only"
  int32  community_window_days = 3;
}
