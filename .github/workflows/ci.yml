name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: TestP4ssword!
          ACCEPT_EULA: Y
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P TestP4ssword! -Q 'SELECT 1' -No"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Format check
        run: |
          dotnet format src/Pressmark.Api/Pressmark.Api.csproj --verify-no-changes
          dotnet format src/Pressmark.Api.Tests/Pressmark.Api.Tests.csproj --verify-no-changes

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          TEST_MSSQL_CONNECTION_STRING: "Server=localhost,1433;Database=pressmark_migration_test;User Id=sa;Password=TestP4ssword!;TrustServerCertificate=True;"

  frontend:
    name: Frontend (Node 22 + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/pressmark-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/pressmark-web/package-lock.json

      - name: Install
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
